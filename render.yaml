databases:
  - name: event-crm-db
    databaseName: event_crm
    user: crm_user
    plan: free

services:
  # Redis (Managed Key-Value)
  - type: keyvalue
    name: event-crm-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # Backend Web Service
  - type: web
    name: event-crm-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: event-crm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: event-crm-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false

  # Frontend Static Site
  - type: static
    name: event-crm-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: event-crm-backend
          type: web
          property: url

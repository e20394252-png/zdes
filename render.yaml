services:
  # Database
  - type: database
    name: event-crm-db
    databaseName: event_crm
    user: crm_user
    plan: free

  # Redis
  - type: redis
    name: event-crm-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # Backend Web Service
  - type: web
    name: event-crm-backend
    env: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-crm-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: event-crm-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false

  # Frontend Static Site
  - type: static
    name: event-crm-frontend
    env: static
    plan: free
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: event-crm-backend
          type: web
          property: host
